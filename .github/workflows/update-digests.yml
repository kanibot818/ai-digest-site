name: Auto-Update Digests

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest digests
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: python3 scripts/fetch_digests.py --fill-missing --limit 100 --output data/digests.json

      - name: Commit changes
        run: |
          git config user.name "KaniBot Digest Bot"
          git config user.email "actions@github.com"
          git add data/digests.json images/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update digests $(date -u '+%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
