
<!DOCTYPE html><html lang="zh-TW"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>配色方案 A — 暖灰莫蘭迪</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4EF;         /* 暖米白 */
  --bg-alt: #EFEAE1;     /* 奶茶灰 */
  --card: #FFFFFF;
  --text: #3A352F;       /* 暖深灰 */
  --text-dim: #8B8073;   /* 灰褐 */
  --accent: #A89B86;     /* 莫蘭迪奶茶 */
  --accent-soft: #D4C9B8;
  --tag-bg: #F0EBE3;
  --tag-text: #9A8B73;
  --border: rgba(168,155,134,0.15);
}
body { font-family:'Inter','Noto Serif TC',sans-serif; background:var(--bg); color:var(--text); margin:0; padding:2rem; }
h1 { font-family:'Noto Serif TC',serif; font-size:1.5rem; }
.swatches { display:flex; gap:1rem; margin:1.5rem 0; }
.swatch { width:80px; text-align:center; }
.swatch div { height:60px; border-radius:8px; margin-bottom:0.3rem; }
.swatch span { font-size:0.65rem; color:var(--text-dim); }
.card-demo { background:var(--card); border-radius:12px; padding:1.5rem; max-width:340px; box-shadow:0 2px 12px rgba(168,155,134,0.08); border:1px solid var(--border); }
.tag { display:inline-block; font-size:0.72rem; padding:2px 10px; border-radius:12px; background:var(--tag-bg); color:var(--tag-text); }
.card-demo h3 { font-family:'Noto Serif TC',serif; font-size:1.05rem; margin:0.6rem 0; }
.card-demo li { font-size:0.82rem; color:var(--text-dim); margin:0.3rem 0; }
.label { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--accent); margin-bottom:0.3rem; }
</style></head><body>
<h1>A — 暖灰莫蘭迪 🍵</h1>
<p style="color:var(--text-dim);font-size:0.85rem">奶茶色調，溫暖知性，像翻開一本設計雜誌</p>
<div class="swatches">
  <div class="swatch"><div style="background:#F7F4EF"></div><span>背景 #F7F4EF</span></div>
  <div class="swatch"><div style="background:#A89B86"></div><span>主色 #A89B86</span></div>
  <div class="swatch"><div style="background:#D4C9B8"></div><span>淺色 #D4C9B8</span></div>
  <div class="swatch"><div style="background:#3A352F"></div><span>文字 #3A352F</span></div>
</div>
<div class="card-demo">
  <span class="tag">AI 語音</span>
  <h3>VoxCPM2 — 無 Tokenizer 的多語言 TTS</h3>
  <div class="label">編輯觀點</div>
  <p style="font-size:0.85rem;color:var(--text);line-height:1.6">Tokenizer-Free 是真正大膽的架構選擇——跳過離散化直接做 diffusion，理論上上限更高。值得關注的是它用 2B 參數就達到接近商用級品質。</p>
</div>
</body></html>
